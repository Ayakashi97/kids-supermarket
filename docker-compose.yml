version: '3.8'

services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: supermarket_web
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - db_data:/app/data
      - ./app/static/images:/app/static/images
    # Pass through USB thermal printer if available
    # devices:
    #   - "/dev/usb/lp0:/dev/usb/lp0"
    env_file:
      - .env
    restart: unless-stopped

volumes:
  db_data:
