services:
  web:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: supermarket_web
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - db_data:/app_root/app/data
      - ./app:/app_root/app
    # Pass through USB thermal printer if available
    # devices:
    #   - "/dev/usb/lp0:/dev/usb/lp0"
    env_file:
      - .env
    restart: unless-stopped

volumes:
  db_data:
