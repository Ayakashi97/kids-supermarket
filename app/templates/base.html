<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kinder-Supermarkt">
    <meta name="theme-color" content="{% block theme_color %}#1e3c72{% endblock %}">
    <link rel="manifest" href="{% block manifest_url %}/manifest.json{% endblock %}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/icon-192.png') }}">
    <title>{% block title %}Kinder-Supermarkt{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('ServiceWorker registered with scope:', reg.scope))
                .catch(err => console.warn('ServiceWorker registration failed:', err));
        });
    }
    </script>
    {% block head %}{% endblock %}
    <style>
        .dev-sim-bar {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: #2c3e50;
            color: white;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 9999;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border: 2px solid #3498db;
        }
        .dev-sim-bar button {
            background: #3498db;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .dev-sim-bar button:hover { background: #2980b9; }
        .dev-sim-bar input {
            padding: 0.4rem;
            border-radius: 6px;
            border: none;
            width: 120px;
        }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    <main class="app-content">
        {% block content %}{% endblock %}
    </main>

    {% if config.DEV_MODE %}
    <!-- DEV MODE EMULATION TOOLBAR -->
    <div class="dev-sim-bar" id="devSimBar">
        <span>🧪 <strong>DEV SIMULATOR:</strong></span>
        <button onclick="simTap('TEST_LENA_123')">👧 Lena</button>
        <button onclick="simTap('TEST_PAPA_456')">👨 Papa</button>
        <button onclick="simTap('UNKNOWN_999')">❓ Unbekannt</button>
        <input type="text" id="devUidInput" placeholder="UID...">
        <button onclick="simTap(document.getElementById('devUidInput').value)">Tap 💳</button>
        <button onclick="simPin('1234')">PIN 1234 🔢</button>
        <a href="/receipt/latest" target="_blank" style="color: #f1c40f; font-weight: bold; margin-left: 0.5rem; text-decoration: none;">📄 Bon (PDF)</a>
        <a href="/terminal" target="_blank" style="color: #4cd137; font-weight: bold; margin-left: 0.5rem; text-decoration: none;">📺 Terminal</a>
    </div>

    <script>
    function getDevSocket() {
        if (window.socket) return window.socket;
        if (typeof io !== 'undefined') {
            window.socket = io();
            return window.socket;
        }
        return null;
    }

    function simTap(uid) {
        if (!uid) return;
        const sock = getDevSocket();
        if (sock) {
            console.log("[DEV SIMULATOR] Emitting card_tapped with UID:", uid);
            sock.emit("card_tapped", { uid: uid });
        } else {
            alert("Socket.IO client library not loaded!");
        }
    }

    function simPin(pin) {
        if (!pin) return;
        const sock = getDevSocket();
        if (sock) {
            console.log("[DEV SIMULATOR] Emitting submit_pin with PIN:", pin);
            sock.emit("submit_pin", { pin: pin });
        } else {
            alert("Socket.IO client library not loaded!");
        }
    }
    </script>
    {% endif %}

    {% block scripts %}{% endblock %}
</body>
</html>
