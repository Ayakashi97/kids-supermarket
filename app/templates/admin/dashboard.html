{% extends "base.html" %}

{% block title %}Admin Dashboard — Kinder-Supermarkt{% endblock %}

{% block content %}
<div class="admin-dashboard-container">
    <h2>Admin Dashboard</h2>
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Produkte</h3>
            <p>{{ products_count }}</p>
        </div>
        <div class="stat-card">
            <h3>Kundenkarten</h3>
            <p>{{ cards_count }}</p>
        </div>
        <div class="stat-card">
            <h3>Einkäufe</h3>
            <p>{{ transactions_count }}</p>
        </div>
    </div>
    <a href="{{ url_for('admin.logout') }}">Abmelden</a>
</div>
{% endblock %}
