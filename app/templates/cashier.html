{% extends "base.html" %}

{% block title %}Kasse — Kinder-Supermarkt{% endblock %}

{% block content %}
<div class="cashier-container">
    <h2>Willkommen an der Kasse!</h2>
    <div class="product-grid">
        {% for product in products %}
        <div class="product-card">
            <span class="emoji">{{ product.emoji or '🛒' }}</span>
            <span class="name">{{ product.name }}</span>
            <span class="price">{{ (product.price_cents / 100) | round(2) }} €</span>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
